
<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'>
<title>Pricing</title>
<style>
body{font-family:Arial;padding:40px;background:#f6f6f6}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
.card{background:#fff;padding:24px;border-radius:16px}
h1{text-align:center}
button{padding:12px 16px;background:#111;color:#fff;border:0;border-radius:8px}
</style>
</head>
<body>
<h1>Plans</h1>
<div class='grid'>
<div class='card'><h2>Starter</h2><h3>₹999</h3><p>3 Requests</p></div>
<div class='card'><h2>Growth</h2><h3>₹2499</h3><p>10 Requests</p></div>
<div class='card'><h2>Pro</h2><h3>₹4999</h3><p>25 Requests</p></div>
<div class='card'><h2>Agency</h2><h3>₹9999</h3><p>Priority Volume</p></div>
</div>
</body>
</html>
