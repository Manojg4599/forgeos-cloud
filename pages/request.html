
<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8'>
<title>Request</title>
<style>
body{font-family:Arial;padding:40px;}
input,select{display:block;margin:10px 0;padding:10px;width:320px;}
button{padding:10px 16px;background:#111;color:#fff;border:0;}
</style>
</head>
<body>

<h1>Client Request Form</h1>

<form id="leadForm">
<input name="name" placeholder="Your Name" required>
<input name="email" placeholder="Email" required>
<select name="service">
<option>Blog Article</option>
<option>Premium Blog</option>
<option>Landing Page</option>
<option>Video Script</option>
<option>LinkedIn Pack</option>
</select>
<input name="budget" placeholder="Budget ₹">
<button type="submit">Submit</button>
</form>

<p id="msg"></p>

<script>
document.getElementById("leadForm").onsubmit = async (e)=>{
e.preventDefault();
let fd = new FormData(e.target);

let obj = {};
fd.forEach((v,k)=>obj[k]=v);

let res = await fetch("/api/lead",{
method:"POST",
body:JSON.stringify(obj)
});

document.getElementById("msg").innerText="Lead submitted successfully.";
e.target.reset();
}
</script>

</body>
</html>
